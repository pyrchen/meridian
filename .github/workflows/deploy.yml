name: Build & Deploy Meridian

on:
  push:
    branches: [main]
  schedule:
    # каждые 2 часа; :17 чтобы не попадать в загруженную «верхушку часа».
    # GitHub cron — best-effort (джиттер 5–30 мин, иногда пропуск). Для утреннего
    # чтения это ок: важна «в итоге свежесть», а не точная минута.
    - cron: '17 */2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# не отменять идущий деплой при новом запуске
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Fetch news + build
        run: pnpm build

      # Коммитим свежий снапшот ленты: keepalive cron'а (активность сбрасывает
      # 60-дневный авто-disable) + история новостей + офлайн-фолбэк. [skip ci]
      # не даёт пушу запустить новый прогон.
      - name: Commit news snapshot
        continue-on-error: true
        run: |
          git config user.name "meridian-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "data: обновление ленты [skip ci]"
          git push

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
