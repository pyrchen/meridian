name: Build & Deploy Meridian

on:
  push:
    branches: [main]
  schedule:
    # каждые 30 минут (:07 и :37, со смещением от загруженной «верхушки часа»).
    # Нужно для среднесрочных сигналов. GitHub cron — best-effort (джиттер
    # 5–30 мин, иногда пропуск); для среднесрока и утренней ленты это ок.
    - cron: '7,37 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# не отменять идущий деплой при новом запуске
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Fetch news
        run: pnpm news

      # Падение анализатора сигналов не должно ломать деплой сайта
      - name: Generate signals
        continue-on-error: true
        run: pnpm signals

      - name: Build site
        run: pnpm build

      # Коммитим свежие снапшоты: keepalive cron'а (активность сбрасывает
      # 60-дневный авто-disable) + история ленты и сигналов + офлайн-фолбэк.
      # Маркер пропуска CI в сообщении не даёт пушу запустить новый прогон.
      - name: Commit data snapshot
        continue-on-error: true
        run: |
          git config user.name "meridian-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json public/data/signals.json
          git diff --staged --quiet || git commit -m "data: обновление ленты и сигналов [skip ci]"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
